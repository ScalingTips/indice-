  if (estado === 'Leído')   return 's-leido';
  if (estado === 'Leyendo') return 's-leyendo';
  return 's-porleer';

  return document.getElementById('sel-' + id).value;

function guardarNombre() {
  const input = document.getElementById('nombre-input').value.trim();

  userName = input;
  localStorage.setItem('scaling_user', userName);
  document.getElementById('modal').classList.remove('visible');

async function cargarVotaciones() {
  try {
    const res = await fetch(SUPABASE_URL + '/rest/v1/valoraciones?select=*', {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
    });
    const data = await res.json();
    const votos = {};
    data.forEach(row => {
      const id = parseInt(row.lectura_id), stars = parseInt(row.estrellas);
      if (!id || !stars) return;
      if (!votos[id]) votos[id] = { suma: 0, count: 0, miVoto: 0 };

      if (row.usuario === userName) votos[id].miVoto = stars;
    });
    Object.keys(votos).forEach(id => {
      const v = votos[id];
      votaciones[id] = { promedio: (v.suma/v.count).toFixed(1), totalVotos: v.count, miVoto: v.miVoto };
    });
  } catch(e) {}
  renderCards();
}

function getVisible() { return lecturas.filter(l => l.estado === currentFilter); }

function renderCards() {
  const wrap = document.getElementById('cards-wrap');
  const visible = getVisible();
  if (!visible.length) { wrap.innerHTML = '<div class="loading-msg">No hay lecturas en esta categoría.</div>'; return; }
  wrap.innerHTML = visible.map(cardHTML).join('');
}

function cardHTML(l) {
  const cat = decisionMap[l.decision] || 'E';
  const v = votaciones[l.id] || { promedio:'—', totalVotos:0, miVoto:0 };
  const estrellas = [1,2,3,4,5].map(n => '<span class="star ' + (n <= v.miVoto ? 'filled' : '') + '" onclick="handleVoto(' + l.id + ',' + n + ')">★</span>').join('');
  const pdfBtn = l.pdf ? '<a href="' + l.pdf + '" target="_blank" class="pdf-btn">Ver PDF</a>' : '<span class="pdf-btn no-pdf">Sin PDF</span>';
  const estadoBadge = l.estado === 'Leído' ? '<span class="estado-badge estado-leido">Leída</span>' : l.estado === 'Por leer' ? '<span class="estado-badge estado-porleer">Por leer</span>' : '<span class="estado-badge estado-leyendo">Leyendo</span>';
  return '<div class="book-card" data-id="' + l.id + '"><div class="card-body"><div class="book-spine spine-' + cat + '">' + cat + l.sesion + '</div><div class="card-main"><div class="card-meta"><span class="decision-badge badge-' + cat + '">' + l.decision + '</span><span class="sesion-num">Sesión ' + l.sesion + '</span>' + estadoBadge + '</div><div class="book-title">' + l.nombre + '</div><div class="book-author">' + l.autor + '</div><div class="book-resumen">' + l.resumen + '</div></div></div><div class="card-footer"><span class="fecha-tag">Fecha Club de Lectura: ' + l.fecha + '</span><div class="footer-right"><div class="stars-wrap"><div class="stars">' + estrellas + '</div><span class="avg-label">' + (v.promedio !== '—' ? v.promedio : '—') + ' ' + (v.totalVotos > 0 ? '(' + v.totalVotos + ')' : '') + '</span></div>' + pdfBtn + '</div></div></div>';
}

function handleVoto(lecturaId, estrellas) {
  if (!userName) { document.getElementById('modal').classList.add('visible'); return; }
  if (!votaciones[lecturaId]) votaciones[lecturaId] = { promedio: estrellas, totalVotos: 1, miVoto: estrellas };
  else votaciones[lecturaId].miVoto = estrellas;
  guardarVoto(lecturaId, estrellas);
  renderCards();
}

async function guardarVoto(lecturaId, estrellas) {
  try {
    await fetch(SUPABASE_URL + '/rest/v1/valoraciones', {
      method: 'POST',
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify({ lectura_id: lecturaId, usuario: userName, estrellas, fecha: new Date().toLocaleDateString('es-CL') })
    });
  } catch(e) {}
}

function filtrar(estado, el) {
  currentFilter = estado;
  document.querySelectorAll('.pill').forEach(p => p.className = 'pill');
  if (estado === 'Leído') el.classList.add('active-leido');
  else if (estado === 'Por leer') el.classList.add('active-porleer');
  else el.classList.add('active-leyendo');
  renderCards();
}

if (userName) {
  document.getElementById('modal').classList.remove('visible');
  document.getElementById('user-chip').style.display = 'flex';
  document.getElementById('user-chip-name').textContent = userName;
  cargarVotaciones();
} else {
  renderCards();
}
<\/script>
</body>
</html>`;
}
</script>

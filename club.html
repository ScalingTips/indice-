<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Club de Lectura · Scaling</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0B1F4A;
    --blue: #185FA5;
    --bg: #F7F6F3;
    --white: #FFFFFF;
    --text: #1A1A2E;
    --muted: #6B7280;
    --border: rgba(0,0,0,0.08);
    --gold: #C8941A;
    --gold-bg: #FEF8E6;

    --c-estrategia: #185FA5;
    --c-estrategia-bg: #EBF3FB;
    --c-personas: #A07800;
    --c-personas-bg: #FEF8E1;
    --c-ejecucion: #6B4423;
    --c-ejecucion-bg: #F5EDE5;
    --c-caja: #1A7A4A;
    --c-caja-bg: #E5F5ED;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #fff;
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Filters ── */
  .filters {
    background: #fff;
    padding: 14px 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 1px solid var(--border);
  }

  .pills-wrap {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .pills-wrap::-webkit-scrollbar { display: none; }

  .pill {
    flex-shrink: 0;
    padding: 7px 16px;
    border-radius: 999px;
    font-size: 13px;
    cursor: pointer;
    border: 1px solid var(--border);
    background: #fff;
    color: var(--muted);
    transition: all 0.15s;
    white-space: nowrap;
  }
  .pill.active-all { background: var(--navy); color: #fff; border-color: var(--navy); }
  .pill.active-leido { background: #1A7A4A; color: #fff; border-color: #1A7A4A; }
  .pill.active-leyendo { background: var(--blue); color: #fff; border-color: var(--blue); }
  .pill.active-porleer { background: #6B4423; color: #fff; border-color: #6B4423; }

  /* ── Cards grid ── */
  .cards-wrap {
    padding: 12px 16px 40px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 100%;
    margin: 0;
  }

  @media (min-width: 600px) {
    .cards-wrap { padding: 20px 24px 48px; }
    .filters { padding: 16px 24px; }
  }

  .book-card {
    background: #fff;
    border-radius: 14px;
    border: 1px solid var(--border);
    overflow: hidden;
    transition: box-shadow 0.18s;
    display: flex;
    flex-direction: column;
  }
  .book-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.07); }
  @media (min-width: 600px) {
    .book-card { flex-direction: row; align-items: stretch; }
    .book-card .card-body { flex: 1; border-bottom: none; }
    .book-card .card-footer { border-top: none; border-left: 1px solid var(--border); flex-direction: column; align-items: flex-end; justify-content: center; min-width: 220px; padding: 16px 20px; gap: 10px; }
    .book-card .footer-right { flex-direction: column; align-items: flex-end; gap: 8px; }
  }

  .card-body {
    padding: 16px 20px;
    display: flex;
    gap: 16px;
    align-items: center;
  }

  .book-spine {
    flex-shrink: 0;
    width: 44px;
    height: 60px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 500;
  }
  .spine-E { background: var(--c-estrategia-bg); color: var(--c-estrategia); }
  .spine-P { background: var(--c-personas-bg); color: var(--c-personas); }
  .spine-X { background: var(--c-ejecucion-bg); color: var(--c-ejecucion); }
  .spine-C { background: var(--c-caja-bg); color: var(--c-caja); }

  .card-main { flex: 1; min-width: 0; }

  .card-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
    flex-wrap: wrap;
  }

  .decision-badge {
    font-size: 10px;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .badge-E { background: var(--c-estrategia-bg); color: var(--c-estrategia); }
  .badge-P { background: var(--c-personas-bg); color: var(--c-personas); }
  .badge-X { background: var(--c-ejecucion-bg); color: var(--c-ejecucion); }
  .badge-C { background: var(--c-caja-bg); color: var(--c-caja); }

  .sesion-num {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
  }

  .book-title {
    font-family: 'Nunito Sans', sans-serif; font-weight: 700;
    font-size: 16px;
    color: var(--text);
    line-height: 1.3;
    margin-bottom: 3px;
  }

  .book-author {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .book-resumen {
    font-size: 13px;
    color: #444;
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-footer {
    border-top: 1px solid var(--border);
    padding: 10px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }


  .footer-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  /* ── Stars ── */

  .avg-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    min-width: 28px;
  }

  /* ── PDF button ── */
  .pdf-btn {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 500;
    color: var(--blue);
    background: var(--c-estrategia-bg);
    border: none;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.15s;
    white-space: nowrap;
  }
  .pdf-btn:hover { background: #D5E8F7; }
  .pdf-btn.no-pdf { color: var(--muted); background: #F3F4F6; cursor: default; }

  /* ── Estado badge ── */
  .estado-badge {
    font-size: 10px;
    font-weight: 500;
    padding: 3px 8px;
    border-radius: 4px;
  }
  .estado-leido { background: #E5F5ED; color: #1A7A4A; }
  .estado-leyendo { background: #EBF3FB; color: #185FA5; }
  .estado-porleer { background: #F5EDE5; color: #6B4423; }

  /* ── Loading / Empty ── */
  .loading-msg {
    text-align: center;
    padding: 48px 16px;
    color: var(--muted);
    font-size: 14px;
  }


</style>
</head>
<body>

<!-- FILTERS -->
<div class="filters">
  <div class="pills-wrap">
    <div class="pill active-leido" onclick="filtrar('Leído', this)">Leídas</div>
    <div class="pill" onclick="filtrar('Leyendo', this)">Leyendo</div>
    <div class="pill" onclick="filtrar('Por leer', this)">Por leer</div>
  </div>
</div>

<!-- CARDS -->
<div class="cards-wrap" id="cards-wrap">
  <div class="loading-msg">Cargando lecturas…</div>
</div>

<script>
// ── DATOS DE LECTURAS ──
const lecturas = [
  { id: 1, sesion: 1, decision: 'Estrategia', nombre: 'What is Strategy', autor: 'Michael Porter, HBR', resumen: 'Estrategia bajada a actividades: fundamental para actividades diferenciadoras.', estado: 'Leído', pdf: 'https://scaling10x.sharepoint.com/:b:/s/Scaling/IQC6nGP29QNQT5Y7Nj3vFb91AS1ZLPbkPUJriIHvh7T-LQ8?e=SESmlf' },
  { id: 2, sesion: 2, decision: 'Estrategia', nombre: "Building Your Company's Vision", autor: 'Jim Collins, HBR', resumen: 'Cómo construir valores y BHAG.', estado: 'Leído', pdf: 'https://scaling10x.sharepoint.com/:b:/s/Scaling/IQAN6G_kwykKQq_afP2PixYaAU4vjtK4CF7VZu2kvZcj0jw?e=6Vffgt' },
  { id: 3, sesion: 2, decision: 'Estrategia', nombre: 'Empieza por el por qué', autor: 'Simon Sinek', resumen: 'Propósito.', estado: 'Leído', pdf: 'https://scaling10x.sharepoint.com/:b:/s/Scaling/IQB8M3V9ufMeRqGRQ7smtmAmATIr5jPjRxxgTHCmDwFWAac?e=x5zWn0' },
  { id: 4, sesion: 2, decision: 'Estrategia', nombre: 'Valores fundamentales', autor: 'Forbes', resumen: 'Importancia valores fundamentales de una empresa.', estado: 'Leído', pdf: 'https://scaling10x.sharepoint.com/:b:/s/Scaling/IQBkdsCjKWsXTZMtYq5x6Go9AcQbJmuSMmpfaxbtCQl_fEI?e=e4B6Kg' },
  { id: 5, sesion: 3, decision: 'Estrategia', nombre: 'Good to Great', autor: 'Jim Collins', resumen: '13 ejemplos y muchas herramientas como Hedgehog concept y BHAG.', estado: 'Leído', pdf: '' },
  { id: 6, sesion: 4, decision: 'Estrategia', nombre: 'Jugar a Ganar: Cómo funciona realmente la estrategia', autor: 'AG Lafley', resumen: 'Estrategia para grandes corporaciones con unidades de negocios.', estado: 'Leyendo', pdf: 'https://scaling10x.sharepoint.com/:b:/s/Scalers2/IQCUw6KEwGMrQpHSAqDzNA19AeV5hZsmVFyPX8xJGRLpn7A?e=ATdDaV' },
  { id: 7, sesion: 5, decision: 'Estrategia', nombre: 'Uncommon Service', autor: 'Frances Frei', resumen: 'Fundamental para Estrategia en una frase y promesa de marca: no se puede ser bueno en todo.', estado: 'Por leer', pdf: '' },
  { id: 8, sesion: 6, decision: 'Personas', nombre: 'The Advantage', autor: 'Patrick Lencioni', resumen: 'Explica cohesión de equipo y el rol de la estrategia (6 preguntas).', estado: 'Por leer', pdf: '' },
  { id: 9, sesion: 7, decision: 'Personas', nombre: '5 Disfunciones de un Equipo', autor: 'Patrick Lencioni', resumen: 'Clave para la efectividad de equipo.', estado: 'Por leer', pdf: '' },
  { id: 10, sesion: 8, decision: 'Personas', nombre: 'Multipliers', autor: 'Liz Wiseman', resumen: 'Liderazgo multiplicador.', estado: 'Por leer', pdf: '' },
  { id: 11, sesion: 9, decision: 'Estrategia', nombre: 'Turning the Flywheel', autor: 'Jim Collins', resumen: 'Profundiza el concepto de flywheel: cada empujón acelera el volante y con el tiempo el impulso se vuelve imparable.', estado: 'Por leer', pdf: '' },
];

let currentFilter = 'Leído';

const decisionMap = {
  'Estrategia': 'E',
  'Personas': 'P',
  'Ejecución': 'X',
  'Caja': 'C'
};

// ── RENDER ──
function getVisible() {
  if (currentFilter === 'all') return lecturas;
  return lecturas.filter(l => l.estado === currentFilter);
}

function renderCards() {
  const wrap = document.getElementById('cards-wrap');
  const visible = getVisible();
  if (visible.length === 0) {
    wrap.innerHTML = '<div class="loading-msg">No hay lecturas en esta categoría.</div>';
    return;
  }
  wrap.innerHTML = visible.map(l => cardHTML(l)).join('');
}

function cardHTML(l) {
  const cat = decisionMap[l.decision] || 'E';

  const pdfBtn = l.pdf
    ? `<a href="${l.pdf}" target="_blank" class="pdf-btn"><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><rect x="1" y="1" width="10" height="10" rx="2" stroke="currentColor" stroke-width="1.2"/><path d="M4 6h4M6 4v4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg> Ver PDF</a>`
    : `<span class="pdf-btn no-pdf">Sin PDF</span>`;

  const estadoBadge = l.estado === 'Leído'
    ? `<span class="estado-badge estado-leido">Leída</span>`
    : l.estado === 'Por leer'
    ? `<span class="estado-badge estado-porleer">Por leer</span>`
    : `<span class="estado-badge estado-leyendo">Leyendo</span>`;

  return `
  <div class="book-card" data-id="${l.id}" data-estado="${l.estado}">
    <div class="card-body">
      <div class="book-spine spine-${cat}">${cat}${l.sesion}</div>
      <div class="card-main">
        <div class="card-meta">
          <span class="decision-badge badge-${cat}">${l.decision}</span>
          <span class="sesion-num">Sesión ${l.sesion}</span>
          ${estadoBadge}
        </div>
        <div class="book-title">${l.nombre}</div>
        <div class="book-author">${l.autor}</div>
        <div class="book-resumen">${l.resumen}</div>
      </div>
    </div>
    <div class="card-footer">
      <div class="footer-right">
        ${pdfBtn}
      </div>
    </div>
  </div>`;
}

function filtrar(estado, el) {
  currentFilter = estado;
  document.querySelectorAll('.pill').forEach(p => {
    p.className = 'pill';
  });
  if (estado === 'Leído') el.classList.add('active-leido');
  else if (estado === 'Por leer') el.classList.add('active-porleer');
  else el.classList.add('active-leyendo');
  renderCards();
}

// ── INIT ──
renderCards();
</script>
</body>
</html>
